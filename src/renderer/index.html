<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no" />
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; script-src 'self' 'unsafe-inline' 'wasm-unsafe-eval' https://hm.baidu.com; style-src 'self' 'unsafe-inline'; font-src 'self' data:; img-src 'self' data: blob: halo-file: https:; connect-src *"
    />
  <title>Vortex - AI that gets things done</title>
    <style>
      /* Anti-flash: set background before CSS loads (default: dark) */
      html, body, #root { background-color: #161822; }
    </style>
    <script>
      // Anti-flash: apply theme before render
      (function() {
        // Background color map for known themes (avoids importing registry)
        // MUST stay in sync with src/renderer/themes/builtins/*.ts preview.background values
        var BG = { dark: '#161822', light: '#ffffff', dracula: '#282a36', 'tokyo-night': '#1a1b26', 'one-dark-pro': '#282c34', nord: '#2e3440', 'catppuccin-mocha': '#1e1e2e' };
        try {
          var stored = localStorage.getItem('halo-theme');
          var themeId = stored || 'dark';
          if (themeId === 'system') {
            themeId = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
          }
          document.documentElement.setAttribute('data-theme', themeId);
          var bg = BG[themeId];
          if (bg) {
            document.documentElement.style.cssText = 'background-color:' + bg + ';color-scheme:' + (themeId === 'light' ? 'light' : 'dark');
          }
        } catch (e) {}
        // Platform class for conditional CSS (e.g. backdrop-filter only on GPU-enabled platforms)
        if (navigator.userAgent.indexOf('Windows') !== -1) {
          document.documentElement.classList.add('platform-win');
        }
      })();
    </script>
    <!-- Baidu Tongji Analytics SDK -->
    <script>
      var _hmt = _hmt || [];
      (function() {
        // Skip Baidu Analytics in remote access / Capacitor mode to prevent leaking sensitive info
        // Detection: Electron env has nodeIntegration or preload-injected APIs
        // Capacitor has window.Capacitor; remote browsers have neither
        var isElectron = typeof process !== 'undefined' || navigator.userAgent.includes('Electron');
        var isCapacitor = window.Capacitor && window.Capacitor.isNativePlatform && window.Capacitor.isNativePlatform();
        if (!isElectron || isCapacitor) {
          console.log('[Analytics] Non-desktop mode detected, Baidu Analytics disabled');
          return;
        }
        var hm = document.createElement("script");
        hm.src = "https://hm.baidu.com/hm.js?ba1b0224eb934176ead125ffccc8861b";
        var s = document.getElementsByTagName("script")[0];
        s.parentNode.insertBefore(hm, s);
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>

    <!-- Global Error Fallback: catches fatal errors before React mounts -->
    <div id="global-error-fallback" style="
      display: none;
      position: fixed;
      inset: 0;
      background: #0a0a0a;
      color: #e5e5e5;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      padding: 40px;
      overflow: auto;
    ">
      <div style="max-width: 600px; margin: 0 auto;">
        <div style="
          width: 48px;
          height: 48px;
          border-radius: 50%;
          border: 2px solid #6366f1;
          opacity: 0.6;
          margin-bottom: 24px;
        "></div>
        <h1 style="font-size: 20px; font-weight: 500; margin: 0 0 8px 0;">
          Vortex failed to start
        </h1>
        <p style="color: #a1a1aa; margin: 0 0 24px 0; font-size: 14px;">
          An error occurred before the application could load. Please copy the error below and report it.
        </p>
        <pre id="global-error-message" style="
          background: #18181b;
          border: 1px solid #27272a;
          border-radius: 8px;
          padding: 16px;
          font-family: 'SF Mono', Monaco, Consolas, monospace;
          font-size: 12px;
          line-height: 1.5;
          overflow-x: auto;
          white-space: pre-wrap;
          word-break: break-all;
          color: #f87171;
          margin: 0;
          user-select: text;
        "></pre>
        <p style="color: #71717a; margin: 16px 0 0 0; font-size: 12px;">
          Try restarting the application. If the problem persists, please report at
          <!-- TODO: Replace with Vortex issue tracker -->
          <!-- <span style="color: #6366f1;">github.com/openkursar/hello-halo/issues</span> -->
        </p>
      </div>
    </div>

    <script>
      // Global error handler for fatal errors before React mounts
      (function() {
        window.__HALO_APP_MOUNTED__ = false;

        function showFatalError(message) {
          if (window.__HALO_APP_MOUNTED__) return; // React is handling errors

          var fallback = document.getElementById('global-error-fallback');
          var errorMsg = document.getElementById('global-error-message');
          var root = document.getElementById('root');

          if (fallback && errorMsg) {
            root.style.display = 'none';
            fallback.style.display = 'block';
            errorMsg.textContent = message;
          }
        }

        window.onerror = function(msg, url, line, col, error) {
          var detail = msg;
          if (url) detail += '\n\nFile: ' + url.split('/').pop() + ':' + line + ':' + col;
          if (error && error.stack) detail += '\n\nStack:\n' + error.stack;
          showFatalError(detail);
          return !window.__HALO_APP_MOUNTED__; // Suppress only if React not mounted
        };

        window.onunhandledrejection = function(event) {
          var reason = event.reason;
          var message = reason instanceof Error
            ? reason.message + (reason.stack ? '\n\nStack:\n' + reason.stack : '')
            : String(reason);
          showFatalError('Unhandled Promise Rejection:\n\n' + message);
        };
      })();
    </script>

    <script type="module" src="./main.tsx"></script>
  </body>
</html>
