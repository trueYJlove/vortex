<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- CSP is relaxed for development (Vite HMR needs ws: connections) -->
    <!-- Production build will have stricter CSP -->
    <title>Vortex Overlay</title>
    <style>
      /* Transparent background for overlay */
      html, body, #root {
        margin: 0;
        padding: 0;
        background: transparent;
        overflow: hidden;
      }
    </style>
    <script>
      // Apply theme from main window
      (function() {
        var LIGHT_IDS = { light: 1, 'light-owl': 1, 'tokyo-night-day': 1, 'github-light': 1, 'catppuccin-latte': 1, 'solarized-light': 1, 'winter-is-coming-light': 1, 'ayu-light': 1 };
        try {
          var stored = localStorage.getItem('vortex-theme');
          var themeId = stored || 'dark';
          if (themeId === 'system') {
            themeId = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
          }
          document.documentElement.setAttribute('data-theme', themeId);
          document.documentElement.setAttribute('data-theme-mode', LIGHT_IDS[themeId] ? 'light' : 'dark');
        } catch (e) {}
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="./overlay-main.tsx"></script>
  </body>
</html>
